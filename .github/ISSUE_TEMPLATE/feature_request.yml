name: 💡 Feature Request
description: Propose a new feature, improvement, or idea for PulseGuard.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a great idea to make PulseGuard better? We'd love to hear it! Describe the feature you want below.
  - type: input
    id: summary
    attributes:
      label: Feature Summary
      description: A brief, clear summary of what you are proposing.
      placeholder: e.g. Add real-time email alerts for ingestion critical errors
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem or limitation is.
      placeholder: e.g. I am frustrated that I have to manually watch the logs dashboard to catch critical errors.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the Solution
      description: A clear and concise description of what you want to happen. Include examples of API contracts or designs if applicable.
      placeholder: e.g. Add a new settings panel under dashboard to select threshold levels and configure SMTP integration.
  - type: textarea
    id: alternatives
    attributes:
      label: Describe Alternatives
      description: Any alternative solutions or workarounds you have considered.
      placeholder: e.g. Webhook integrations or Sentry alerts.
