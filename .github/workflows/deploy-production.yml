name: Deploy Production

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }} # Production Neon Database URL

jobs:
  deploy-prod:
    name: Production Deployment & Database Migration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Get pnpm store directory
        shell: bash
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm files
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Database Migrations (Neon)
        run: pnpm --filter @pulseguard/db db:migrate
        # Or alternatively: pnpm exec prisma migrate deploy
        # We ensure production schemas are up-to-date before code release
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install Vercel CLI
        run: pnpm install --global vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts (Vercel Prod)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project to Vercel (Production)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "PROD_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Notify Slack Webhook on Success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "🚀 PulseGuard Production Deploy Success!"
          SLACK_MESSAGE: |
            *Branch:* main
            *Deploy URL:* ${{ steps.deploy.outputs.PROD_URL }}
            *Commit Message:* ${{ github.event.head_commit.message }}
            *Author:* ${{ github.event.head_commit.author.name }}
          SLACK_COLOR: "#2EB67D"

      - name: Notify Slack Webhook on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "🚨 PulseGuard Production Deploy Failed!"
          SLACK_MESSAGE: |
            *Branch:* main
            *Workflow:* ${{ github.workflow }}
            *Commit Message:* ${{ github.event.head_commit.message }}
            *Author:* ${{ github.event.head_commit.author.name }}
            Please inspect the Github Actions logs.
          SLACK_COLOR: "#E01E5A"
