name: Auto Close Stale Issues

on:
  schedule:
    # Run once everyday at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Manage Stale Issues
    runs-on: ubuntu-latest
    steps:
      - name: Stale Detection & Action
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Configuration parameters
          days-before-stale: 30
          days-before-close: 7
          
          # Labels to apply
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          
          # Friendly messages
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
            Thank you for your contributions!
          close-issue-message: >
            This issue has been closed automatically due to inactivity. If this is still
            an issue, please feel free to reopen it or file a new issue.
            
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
            Thank you for your contributions!
          close-pr-message: >
            This pull request has been closed automatically due to inactivity.
            
          # Exemptions
          exempt-issue-labels: 'pinned,bug'
          exempt-pr-labels: 'pinned,bug'
          exempt-draft-prs: true
