name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  dependency-review:
    name: Check Vulnerabilities & License Conflicts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # We can specify severity level threshold
          fail-on-severity: moderate
          # Block PRs that add packages with incompatible licenses if needed, e.g., GPL licenses
          # deny-licenses: GPL-1.0-or-later, GPL-2.0-or-later, GPL-3.0-or-later, AGPL-3.0-or-later
